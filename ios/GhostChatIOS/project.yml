name: GhostChatIOS
options:
  minimumXcodeGenVersion: 2.38.0
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.ghostchat.ios
    SWIFT_VERSION: 5.9
    IPHONEOS_DEPLOYMENT_TARGET: 17.0
targets:
  GhostChatIOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: .
        excludes:
          - README.md
          - project.yml
          - Assets.xcassets
          - GhostChat.xcodeproj
          - "*.xcworkspace"
    resources:
      - path: Assets.xcassets
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_CFBundleDevelopmentRegion: pt-BR
        INFOPLIST_KEY_CFBundleDisplayName: GhostChat
        INFOPLIST_KEY_LSRequiresIPhoneOS: true
        INFOPLIST_KEY_UIRequiresFullScreen: false
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        DEVELOPMENT_TEAM: ""
        GENERATE_INFOPLIST_FILE: true
        TARGETED_DEVICE_FAMILY: "1,2"
