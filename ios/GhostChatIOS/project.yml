# Fonte de identidade do app (bundle, nome do alvo). Após editar: `xcodegen generate`
# Valores canónicos: bundle `com.ghosthchat`, nome no ecrã inicial GhostChat (CFBundleDisplayName).
# Segredo iOS: Config/Secrets.xcconfig + Secrets.local.xcconfig (ver README).
name: GhostChat
options:
  minimumXcodeGenVersion: 2.38.0
# Nível de projeto (não dentro de `options`) — liga Secrets.xcconfig às configs Debug/Release
configFiles:
  Debug: Config/Secrets.xcconfig
  Release: Config/Secrets.xcconfig
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.ghosthchat
    SWIFT_VERSION: 5.9
    IPHONEOS_DEPLOYMENT_TARGET: 17.0
targets:
  GhostChat:
    type: application
    # Garante que o segredo do xcconfig entra nas configs do alvo (Info.plist).
    configFiles:
      Debug: Config/Secrets.xcconfig
      Release: Config/Secrets.xcconfig
    # Gera esquema partilhado `GhostChat` em xcshareddata (CI / clone limpo)
    scheme: {}
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: .
        excludes:
          - README.md
          - project.yml
          - GhostChat.xcodeproj
          - "*.xcworkspace"
          - "**/*.example.swift"
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_CFBundleDevelopmentRegion: pt-BR
        INFOPLIST_KEY_CFBundleDisplayName: GhostChat
        INFOPLIST_KEY_CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLName: ghosth.chat
            CFBundleURLSchemes:
              - ghostchat
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.entertainment
        INFOPLIST_KEY_LSRequiresIPhoneOS: true
        INFOPLIST_KEY_UIRequiresFullScreen: false
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        DEVELOPMENT_TEAM: WSGT97CB7E
        GENERATE_INFOPLIST_FILE: true
        TARGETED_DEVICE_FAMILY: "1,2"
        MARKETING_VERSION: "1"
        CURRENT_PROJECT_VERSION: "3"
    entitlements:
      path: GhostChat.entitlements
      properties:
        com.apple.developer.associated-domains:
          - applinks:ghosth.chat
